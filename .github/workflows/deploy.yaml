name: deploy to vm
on: 
  push: 
    branches: [ main ]
jobs: 
  deploy: 
    runs-on: ubuntu-latest 
    steps: 
      - name: checkout code
        uses: actions/checkout@v4
      - name: deploy via ssh 
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER1 }}
          key: ${{ secrets.VM_KEY }}
          script: |
            cd /home/${{ secrets.VM_USER1 }}/ml_deploy 
            git pull
            sudo docker compose down
            sudo docker compose up -d --build

          


